services:
  postgres:
    image: postgres:16-alpine
    container_name: soundcloud_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=soundbot
      - POSTGRES_USER=soundbot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundbot -d soundbot"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: soundcloud_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
    container_name: soundcloud_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-soundbot}
      - REDIS_REQUIRED=${REDIS_REQUIRED:-1}
      - PAYMENTS_DATABASE_URL=${PAYMENTS_DATABASE_URL:?PAYMENTS_DATABASE_URL is required}
      - PAYMENTS_DB_REQUIRED=${PAYMENTS_DB_REQUIRED:-1}
      - PAYMENTS_DB_CONNECT_TIMEOUT=${PAYMENTS_DB_CONNECT_TIMEOUT:-5}
      - PAYMENTS_ALERT_WINDOW_SECONDS=${PAYMENTS_ALERT_WINDOW_SECONDS:-900}
      - PAYMENTS_ALERT_THRESHOLD=${PAYMENTS_ALERT_THRESHOLD:-10}
      - LOG_TO_STDOUT=${LOG_TO_STDOUT:-1}
      - LOG_TO_FILE=${LOG_TO_FILE:-1}
      - LOG_FILE=${LOG_FILE:-/app/logs/bot.log}
      - LOG_FILE_MAX_BYTES=${LOG_FILE_MAX_BYTES:-20971520}
      - LOG_FILE_BACKUP_COUNT=${LOG_FILE_BACKUP_COUNT:-10}
      - FFMPEG_REQUIRED_ON_STARTUP=${FFMPEG_REQUIRED_ON_STARTUP:-1}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./cookies.txt:/app/cookies.txt
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  redis_data:
  postgres_data:
