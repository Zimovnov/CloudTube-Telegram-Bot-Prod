services:
  redis:
    image: redis:7.4-alpine
    container_name: soundcloud_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --requirepass
      - ${REDIS_PASSWORD:-change-me-redis-pass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me-redis-pass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
    container_name: soundcloud_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-soundbot}
      - REDIS_REQUIRED=${REDIS_REQUIRED:-1}
      - LOG_TO_STDOUT=${LOG_TO_STDOUT:-1}
      - LOG_TO_FILE=${LOG_TO_FILE:-1}
      - LOG_FILE=${LOG_FILE:-/app/logs/bot.log}
      - LOG_FILE_MAX_BYTES=${LOG_FILE_MAX_BYTES:-20971520}
      - LOG_FILE_BACKUP_COUNT=${LOG_FILE_BACKUP_COUNT:-10}
      - FFMPEG_REQUIRED_ON_STARTUP=${FFMPEG_REQUIRED_ON_STARTUP:-1}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./cookies.txt:/app/cookies.txt
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  redis_data:
