services:
  redis:
    image: redis:7.4.3-alpine
    container_name: soundcloud_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
    container_name: soundcloud_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-soundbot}
      - REDIS_REQUIRED=${REDIS_REQUIRED:-1}
      - MAX_MEDIA_DURATION_SECONDS=${MAX_MEDIA_DURATION_SECONDS:-10800}
      - LOG_TO_STDOUT=${LOG_TO_STDOUT:-1}
      - LOG_TO_FILE=${LOG_TO_FILE:-1}
      - LOG_FILE=${LOG_FILE:-/app/logs/bot.log}
      - LOG_FILE_MAX_BYTES=${LOG_FILE_MAX_BYTES:-5242880}
      - LOG_FILE_BACKUP_COUNT=${LOG_FILE_BACKUP_COUNT:-3}
      - FFMPEG_REQUIRED_ON_STARTUP=${FFMPEG_REQUIRED_ON_STARTUP:-1}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
      - ./logs:/app/logs
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data:
